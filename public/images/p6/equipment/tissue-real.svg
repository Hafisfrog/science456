<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img" aria-label="Tissue papers">
  <defs>
    <linearGradient id="sheetA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#dde5ef"/>
    </linearGradient>
    <linearGradient id="sheetB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef3f8"/>
      <stop offset="100%" stop-color="#cfd9e5"/>
    </linearGradient>
    <filter id="paperShadow" x="-40%" y="-40%" width="200%" height="220%">
      <feDropShadow dx="0" dy="18" stdDeviation="14" flood-color="#1f2937" flood-opacity=".22"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="1" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.03"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="900" height="620" fill="none"/>

  <g filter="url(#paperShadow)">
    <rect x="268" y="126" width="430" height="360" rx="10" transform="rotate(-12 483 306)" fill="url(#sheetB)" stroke="#b8c6d6" stroke-width="3"/>
    <rect x="256" y="150" width="430" height="360" rx="10" transform="rotate(8 471 330)" fill="url(#sheetA)" stroke="#bcc9d8" stroke-width="3"/>
    <rect x="246" y="138" width="430" height="360" rx="10" transform="rotate(-3 461 318)" fill="url(#sheetA)" stroke="#c1cddc" stroke-width="3"/>

    <g transform="rotate(-3 461 318)">
      <rect x="246" y="138" width="430" height="360" rx="10" fill="none" filter="url(#grain)"/>
      <path d="M264 160c64-6 126 2 188 6 66 4 129-9 196 1" fill="none" stroke="#d8e0e9" stroke-width="2" stroke-opacity=".5"/>
      <path d="M265 452c101 16 254 9 384-4" fill="none" stroke="#ced8e2" stroke-width="2" stroke-opacity=".45"/>
    </g>
  </g>
</svg>
