<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420" role="img" aria-label="Paper bits">
  <defs>
    <linearGradient id="paperA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbfdff"/>
      <stop offset="100%" stop-color="#d9e3ee"/>
    </linearGradient>
    <linearGradient id="paperB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f2f7fc"/>
      <stop offset="100%" stop-color="#cad6e4"/>
    </linearGradient>
    <linearGradient id="paperC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#d3deea"/>
    </linearGradient>
    <filter id="pieceShadow" x="-35%" y="-35%" width="190%" height="220%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#111827" flood-opacity=".2"/>
    </filter>
    <filter id="paperTexture" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="1" seed="4" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="520" height="420" fill="none"/>

