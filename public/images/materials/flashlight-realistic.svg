<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 520 220"
  role="img"
  aria-label="Realistic flashlight"
>
  <defs>
    <linearGradient id="tailGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="45%" stop-color="#4b5563" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0b1220" />
      <stop offset="12%" stop-color="#1f2937" />
      <stop offset="32%" stop-color="#6b7280" />
      <stop offset="48%" stop-color="#e5e7eb" />
      <stop offset="64%" stop-color="#9ca3af" />
      <stop offset="82%" stop-color="#374151" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="knurlGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f2937" stop-opacity="0.95" />
      <stop offset="50%" stop-color="#111827" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#374151" stop-opacity="0.92" />
    </linearGradient>
    <pattern id="knurlPattern" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M0 10L10 0" stroke="#94a3b8" stroke-opacity="0.3" stroke-width="1.2" />
      <path d="M-5 10L5 0M5 10L15 0" stroke="#111827" stroke-opacity="0.45" stroke-width="0.9" />
    </pattern>
    <linearGradient id="headGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="28%" stop-color="#4b5563" />
      <stop offset="56%" stop-color="#d1d5db" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f2937" />
      <stop offset="38%" stop-color="#9ca3af" />
      <stop offset="50%" stop-color="#f3f4f6" />
      <stop offset="78%" stop-color="#9ca3af" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <radialGradient id="lensGrad" cx="38%" cy="35%" r="68%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="24%" stop-color="#fef9c3" />
      <stop offset="55%" stop-color="#fde68a" />
      <stop offset="100%" stop-color="#f59e0b" />
    </radialGradient>
    <radialGradient id="lensCore" cx="42%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0.78" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <filter id="drop" x="-20%" y="-40%" width="140%" height="220%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3.2" />
      <feOffset dy="3" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.45" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <clipPath id="bodyClip">
      <rect x="86" y="80" width="248" height="60" rx="30" />
    </clipPath>
  </defs>

  <ellipse cx="254" cy="154" rx="206" ry="18" fill="#020617" fill-opacity="0.35" filter="url(#drop)" />

  <g filter="url(#drop)">
    <rect x="52" y="86" width="36" height="48" rx="17" fill="url(#tailGrad)" stroke="#111827" stroke-opacity="0.75" />
    <rect x="78" y="88" width="12" height="44" rx="6" fill="#111827" />

    <rect x="86" y="80" width="248" height="60" rx="30" fill="url(#bodyGrad)" stroke="#475569" stroke-opacity="0.7" />

    <g clip-path="url(#bodyClip)">
      <rect x="124" y="84" width="134" height="52" rx="22" fill="url(#knurlGrad)" />
      <rect x="124" y="84" width="134" height="52" rx="22" fill="url(#knurlPattern)" />
    </g>

    <rect x="216" y="92" width="16" height="36" rx="7" fill="#334155" stroke="#0f172a" stroke-opacity="0.8" />
    <rect x="220" y="98" width="8" height="24" rx="4" fill="#64748b" />

    <rect x="322" y="84" width="22" height="52" rx="11" fill="url(#ringGrad)" stroke="#334155" stroke-opacity="0.6" />
    <rect x="336" y="74" width="76" height="72" rx="34" fill="url(#headGrad)" stroke="#1f2937" stroke-opacity="0.8" />
    <rect x="394" y="61" width="78" height="98" rx="38" fill="url(#ringGrad)" stroke="#334155" stroke-opacity="0.65" />

    <circle cx="434" cy="110" r="33" fill="url(#lensGrad)" stroke="#cbd5e1" stroke-width="3" />
    <circle cx="434" cy="110" r="15" fill="url(#lensCore)" />

    <ellipse cx="192" cy="92" rx="88" ry="8" fill="#ffffff" fill-opacity="0.28" />
    <ellipse cx="420" cy="87" rx="21" ry="6" fill="#ffffff" fill-opacity="0.42" />
    <circle cx="434" cy="96" r="5.8" fill="#ffffff" fill-opacity="0.78" />
  </g>
</svg>
